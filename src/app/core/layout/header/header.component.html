<div class="fixed top-4 left-0 right-0 z-[100] flex justify-end pr-6">
  <!-- Header estilo Cápsula Premium -->
  <header
    class="relative h-16 w-full max-w-[calc(100%-280px)] rounded-full border border-white/10 bg-[#0a0a0a]/80 shadow-2xl backdrop-blur-2xl transition-all duration-500"
  >
    <div class="flex h-full items-center justify-between px-8">
      <!-- LADO IZQUIERDO: Títulos -->
      <div class="flex flex-col animate-in slide-in-from-left duration-700">
        <span class="text-[9px] font-black uppercase tracking-[2px] text-k-green mb-0.5"
          >Core Panel</span
        >
        <h1 class="text-lg font-black uppercase tracking-tight text-white leading-none">
          {{ title }}
        </h1>
      </div>

      <!-- CENTRO: Espacio para navegación dinámica (Caja, etc.) -->
      <div class="flex-1 flex justify-center px-4">
        <ng-content select="[center]"></ng-content>
      </div>

      <!-- LADO DERECHO: Acciones y Perfil -->
      <div class="flex items-center gap-4">
        <!-- Estado de Sincronización -->
        <div
          class="flex items-center gap-2 rounded-full border border-k-green/20 bg-k-green/5 px-4 py-1.5 transition-all"
        >
          <div
            [class]="'h-1.5 w-1.5 rounded-full ' + (isOnline() ? 'bg-k-green animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.5)]' : 'bg-k-red shadow-[0_0_8px_rgba(224,47,47,0.5)]')"
          ></div>
          <span class="text-[9px] font-black uppercase tracking-widest text-k-green">
            {{ isOnline() ? 'Sincronizado' : 'Offline' }}
          </span>
          <span class="material-symbols-rounded text-sm text-k-green">cloud_done</span>
        </div>

        <!-- Notificaciones -->
        <div class="notifications-container relative">
          <button
            (click)="toggleNotifications()"
            class="flex h-10 w-10 items-center justify-center rounded-xl bg-white/5 text-white/40 hover:bg-white/10 hover:text-white transition-all relative"
          >
            <span class="material-symbols-rounded text-xl">notifications</span>
            @if (unreadCount > 0) {
              <div
                class="absolute top-2 right-2 w-2 h-2 bg-k-red rounded-full shadow-[0_0_5px_rgba(224,47,47,1)]"
              ></div>
            }
          </button>
        </div>

        <!-- Área de Perfil -->
        <div class="user-menu-container relative">
          <button
            (click)="toggleMenu()"
            class="flex items-center gap-3 rounded-xl bg-white/5 p-1 pr-3 hover:bg-white/10 transition-all border border-white/5"
          >
            <div
              class="flex h-8 w-8 items-center justify-center rounded-lg bg-k-green text-[12px] font-black text-black uppercase"
            >
              {{ userName.substring(0, 1) }}
            </div>
            <span class="material-symbols-rounded text-lg text-white/40">expand_more</span>
          </button>

          <!-- Menú Perfil -->
          @if (isMenuOpen()) {
            <div
              class="absolute right-0 top-12 w-52 overflow-hidden rounded-2xl border border-white/5 bg-[#0a0a0a] p-1.5 shadow-2xl animate-in fade-in slide-in-from-top-2 duration-300 z-[110]"
            >
              <div class="mb-1 border-b border-white/5 p-3">
                <p class="text-[8px] font-black uppercase tracking-widest text-white/30">
                  Usuario Activo
                </p>
                <p class="mt-0.5 truncate text-[11px] font-bold text-white">{{ userName }}</p>
              </div>

              <button
                (click)="onLogout()"
                class="flex w-full items-center gap-2.5 rounded-xl p-3 text-k-red transition-colors hover:bg-k-red/10"
              >
                <span class="material-symbols-rounded text-base">logout</span>
                <span class="text-[9px] font-black uppercase tracking-widest">Cerrar Sesión</span>
              </button>
            </div>
          }
        </div>
      </div>
    </div>
  </header>
</div>

<!-- Panel de Notificaciones Oficial -->
@if (isNotificationsOpen()) {
  <k-notification-center (close)="toggleNotifications()"></k-notification-center>
}

<div class="h-20"></div>
