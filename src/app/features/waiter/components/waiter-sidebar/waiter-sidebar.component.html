<aside
  class="flex h-full w-[110px] shrink-0 flex-col border-r border-white/[0.05] bg-black/20 backdrop-blur-[25px]"
>
  <div class="flex flex-col items-center pt-12">
    <div
      class="rounded-full bg-white/[0.03] p-3 ring-1 ring-white/[0.04]"
    >
      <div class="h-[42px] w-[42px] overflow-hidden rounded-xl bg-white/10">
        <img
          src="assets/images/LogoOriginal.png"
          alt="Kimsa"
          class="h-full w-full object-cover"
          (error)="$any($event.target).style.display = 'none'"
        />
      </div>
    </div>
  </div>

  <nav class="no-scrollbar mt-14 flex flex-1 flex-col gap-0 overflow-y-auto px-3 py-2">
    @for (cat of activeCats(); track cat.id) {
      <button
        type="button"
        class="mb-4 ml-2.5 flex w-[calc(100%-10px)] flex-col items-center rounded-[24px] border p-2.5 transition-all duration-300"
        [ngClass]="
          selectedCategory === cat.name
            ? 'border-k-red border-2 bg-k-red/15 shadow-[0_6px_15px_rgba(224,47,47,0.25)]'
            : 'border-[1.5px] border-white/[0.05] bg-white/[0.02] hover:border-white/10'
        "
        (click)="categorySelected.emit(cat.name)"
      >
        <div
          class="flex h-[38px] w-[38px] items-center justify-center overflow-hidden rounded-2xl"
          [ngClass]="selectedCategory === cat.name ? 'bg-k-red/10' : 'bg-black/40'"
        >
          <span
            class="material-symbols-rounded text-[22px]"
            [ngClass]="selectedCategory === cat.name ? 'text-k-red' : 'text-white/25'"
          >{{ iconFor(cat.name) }}</span>
        </div>
        <span
          class="mt-1.5 max-w-full truncate text-center text-[9px] font-black uppercase tracking-wide"
          [ngClass]="selectedCategory === cat.name ? 'text-white' : 'text-white/30'"
        >
          {{ cat.name }}
        </span>
      </button>
    }
  </nav>
</aside>
