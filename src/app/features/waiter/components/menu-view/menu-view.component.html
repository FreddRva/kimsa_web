<div class="flex h-full min-h-0 flex-col px-5 pb-6 pt-3 md:px-10">
  <!-- Barra filtros tipo Flutter ProductSection -->
  <div class="no-scrollbar mb-6 overflow-x-auto pb-1">
    <div class="flex min-w-max items-center gap-2.5">
      <button
        type="button"
        class="flex shrink-0 items-center gap-2 rounded-xl px-4 py-3 text-[11px] font-bold transition-all duration-200 md:px-5"
        [disabled]="mesaLocked() && !mesaActive()"
        [ngClass]="
          mesaActive()
            ? 'bg-k-red/85 text-white shadow-[0_4px_12px_rgba(224,47,47,0.35)]'
            : mesaLocked()
              ? 'cursor-not-allowed bg-white/[0.02] text-white/20'
              : 'bg-white/[0.05] text-white hover:bg-white/10'
        "
        (click)="mesaChip.emit()"
      >
        <span class="material-symbols-rounded text-base">table_bar</span>
        {{ mesaLabel() }}
      </button>

      <button
        type="button"
        class="flex shrink-0 items-center gap-2 rounded-xl px-4 py-3 text-[11px] font-bold transition-all duration-200 md:px-5"
        [disabled]="llevarLocked() && !llevarActive()"
        [ngClass]="
          llevarActive()
            ? 'bg-amber-600/90 text-white shadow-[0_4px_12px_rgba(217,119,6,0.35)]'
            : llevarLocked()
              ? 'cursor-not-allowed bg-white/[0.02] text-white/20'
              : 'bg-white/[0.05] text-white hover:bg-white/10'
        "
        (click)="llevarChip.emit()"
      >
        <span class="material-symbols-rounded text-base">shopping_bag</span>
        {{ llevarLabel() }}
      </button>

      <button
        type="button"
        class="flex shrink-0 items-center gap-2 rounded-xl px-4 py-3 text-[11px] font-bold transition-all duration-200 md:px-5"
        [ngClass]="
          isPopular
            ? 'bg-amber-500/90 text-white shadow-[0_4px_12px_rgba(245,158,11,0.35)]'
            : 'bg-white/[0.05] text-white hover:bg-white/10'
        "
        (click)="popularChip.emit()"
      >
        <span class="material-symbols-rounded text-base">local_fire_department</span>
        POPULARES
      </button>

      <span
        class="pointer-events-none hidden select-none pl-6 text-[38px] font-black leading-none text-white/[0.04] md:inline"
        >{{ watermark() }}</span
      >
    </div>
  </div>

  <!-- Grid tarjetas producto -->
  <div class="no-scrollbar min-h-0 flex-1 overflow-y-auto pb-16">
    <div class="grid grid-cols-2 gap-4 md:grid-cols-3 md:gap-x-6 md:gap-y-8">
      @for (product of products; track product.id) {
        <article
          class="group relative flex min-h-[240px] flex-col overflow-hidden rounded-[32px] border border-white/[0.08] shadow-[0_10px_20px_rgba(0,0,0,0.4)] md:min-h-[280px]"
        >
          <button
            type="button"
            class="relative flex min-h-[220px] flex-1 flex-col text-left outline-none"
            (click)="showDetails.emit(product)"
          >
            @if (productImage(product)) {
              <img
                [src]="productImage(product)"
                [alt]="product.name"
                class="absolute inset-0 h-full w-full object-cover"
                (error)="$any($event.target).style.opacity = '0'"
              />
            } @else {
              <div
                class="absolute inset-0 bg-cover bg-center opacity-30"
                style="background-image: url('assets/images/FondoMozo.png')"
              ></div>
            }
            <div
              class="absolute inset-0 bg-gradient-to-b from-black/10 via-black/30 to-black/95"
            ></div>
            @if (isPopular) {
              <div
                class="absolute right-3 top-3 flex h-8 w-8 items-center justify-center rounded-full bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.4)]"
              >
                <span class="material-symbols-rounded text-sm text-white">local_fire_department</span>
              </div>
            }
            <div
              class="relative mt-auto border-t border-white/10 bg-black/30 px-4 py-3 backdrop-blur-[10px]"
            >
              <h3 class="line-clamp-1 text-center text-[15px] font-black uppercase tracking-wide text-white">
                {{ product.name }}
              </h3>
              @if (product.description) {
                <p class="mt-1 line-clamp-1 text-center text-[10px] font-semibold text-white/60">
                  {{ product.description }}
                </p>
              }
              <div class="mt-3 flex flex-wrap justify-center gap-2">
                @if (product.variations?.length) {
                  @for (v of $any(product.variations); track v.name) {
                    <button
                      type="button"
                      class="rounded-xl border border-white/20 bg-gradient-to-br from-k-red to-[#8b0000] px-3.5 py-2.5 text-left shadow-[0_4px_12px_rgba(224,47,47,0.4)] transition hover:brightness-110"
                      (click)="$event.stopPropagation(); addWithVariation(product, v)"
                    >
                      <span class="text-[10px] font-bold uppercase text-white/70">{{ v.name }}</span>
                      <span class="ml-2 text-[13px] font-black text-white">S/ {{ formatPrice(v.price) }}</span>
                    </button>
                  }
                } @else {
                  <button
                    type="button"
                    class="rounded-xl border border-white/30 bg-gradient-to-br from-k-red to-[#8b0000] px-5 py-2.5 text-base font-black text-white shadow-[0_4px_12px_rgba(224,47,47,0.4)] transition hover:brightness-110"
                    (click)="$event.stopPropagation(); addItem.emit(product)"
                  >
                    S/ {{ formatPrice(product.price) }}
                  </button>
                }
              </div>
            </div>
          </button>
        </article>
      }
    </div>
  </div>
</div>
