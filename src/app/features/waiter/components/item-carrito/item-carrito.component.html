<k-card 
  variant="glass" 
  padding="none" 
  radius="lg" 
  customClass="group border-white/5 hover:border-white/10"
>
  <div class="p-4 flex items-start justify-between gap-4 relative">
    <!-- Detalles del Producto -->
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 mb-1">
        <span class="text-[11px] font-black text-white uppercase tracking-tight truncate">{{ item.name }}</span>
      </div>
      
      <!-- Input de Notas Estilizado -->
      <div class="flex items-center gap-2 bg-black/20 rounded-lg px-2 py-1 border border-white/5">
        <span class="material-symbols-rounded text-[12px] text-white/20">edit_note</span>
        <input 
          type="text"
          class="flex-1 bg-transparent text-[9px] font-bold text-white/40 outline-none placeholder:text-white/10"
          placeholder="Añadir instrucción..."
          [value]="item.notes || ''"
          (input)="onUpdateNotes($any($event.target).value)"
        />
      </div>

      <!-- Precio -->
      <div class="mt-3 flex items-baseline gap-2">
        <span class="text-sm font-black text-k-green italic">S/ {{ (item.price * item.quantity) | number:'1.2-2' }}</span>
        <span class="text-[8px] font-bold text-white/20 uppercase text-right flex-1">Unit: S/ {{ item.price | number:'1.2-2' }}</span>
      </div>
    </div>

    <!-- Controles de Cantidad -->
    <div class="flex flex-col items-center bg-black/20 rounded-2xl border border-white/5 overflow-hidden">
      <k-button 
        variant="ghost" 
        customClass="!px-3 !py-2 !rounded-none hover:!bg-k-green hover:!text-black" 
        (kClick)="onAdd.emit()"
      >
        <span class="material-symbols-rounded text-base">add</span>
      </k-button>
      
      <div class="h-6 flex items-center justify-center">
        <span class="text-[11px] font-black italic text-white">{{ item.quantity }}</span>
      </div>

      <k-button 
        variant="ghost" 
        customClass="!px-3 !py-2 !rounded-none hover:!bg-k-red hover:!text-white" 
        (kClick)="onRemove.emit()"
      >
        <span class="material-symbols-rounded text-base">remove</span>
      </k-button>
    </div>

    <!-- Decoración lateral activa -->
    <div class="absolute left-0 top-4 bottom-4 w-1 bg-k-green rounded-r-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
  </div>
</k-card>
