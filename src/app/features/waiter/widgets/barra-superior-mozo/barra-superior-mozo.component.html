<k-header
  shell="default"
  appearance="dark"
  title="CENTRO DE COMANDA"
  [userName]="userName()"
  userRole="Atención al Cliente"
  (logout)="onLogout()"
>
  <div center class="w-full max-w-md px-4">
    <div class="relative flex items-center">
      <span class="material-symbols-rounded absolute left-3 text-base text-white/20 pointer-events-none">search</span>
      <input
        #searchInput
        type="text"
        [value]="searchQuery()"
        (input)="searchQuery.set(searchInput.value)"
        placeholder="Buscar plato..."
        class="w-full h-8 bg-white/5 border border-white/10 rounded-full pl-10 pr-4 text-[11px] text-white placeholder:text-white/20 outline-none focus:border-k-green/30 focus:bg-white/10 transition-all shadow-inner"
      />
    </div>
  </div>
</k-header>
