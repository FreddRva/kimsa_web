<div class="h-full flex flex-col gap-8 animate-in fade-in duration-500">
  <header class="flex justify-between items-center">
    <div>
      <h2 class="text-2xl font-black tracking-tighter text-white">Mesas Disponibles</h2>
      <p class="text-[10px] font-black opacity-30 uppercase tracking-[2px]">
        Selecciona una ubicación
      </p>
    </div>
    <k-button variant="glass" size="sm" (kClick)="onDelivery.emit()">DELIVERY</k-button>
  </header>

  <div
    class="max-h-[75vh] grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 overflow-y-auto no-scrollbar pr-2 pb-6"
  >
    @for (table of tables; track table.id) {
      <k-card
        [padding]="'md'"
        [radius]="'lg'"
        [clickable]="true"
        (kClick)="selectTable.emit(table)"
        [customClass]="
          table.status === 'occupied'
            ? 'opacity-80 border-k-red/50 shadow-[0_0_15px_rgba(224,47,47,0.15)]'
            : ''
        "
      >
        <div class="flex flex-col items-center gap-3 py-4">
          <div
            [class]="
              'w-12 h-12 rounded-2xl flex items-center justify-center ' +
              (table.status === 'occupied' ? 'bg-k-red/15 text-k-red' : 'bg-k-green/15 text-k-green')
            "
          >
            <span class="material-symbols-rounded text-2xl">table_restaurant</span>
          </div>
          <span [class]="'text-lg font-black italic ' + (table.status === 'occupied' ? 'text-k-red' : 'text-white')">
            MESA {{ table.number }}
          </span>
          <span [class]="'text-[9px] font-black uppercase tracking-widest ' + (table.status === 'occupied' ? 'text-k-red/60' : 'text-white/30')">
            {{ table.status === 'occupied' ? 'OCUPADA' : 'LIBRE' }}
          </span>
        </div>
      </k-card>
    }
  </div>
</div>
