<k-card 
  variant="luxury" 
  padding="none" 
  radius="xl" 
  customClass="min-w-[500px] max-h-[85vh] flex flex-col border-white/5"
>
  <!-- Header Minimalista -->
  <header class="flex items-center justify-between p-8 pb-4">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 rounded-2xl bg-k-green flex items-center justify-center text-black shadow-[0_0_15px_rgba(34,197,94,0.4)]">
        <span class="material-symbols-rounded text-2xl">table_restaurant</span>
      </div>
      <div>
        <h2 class="text-xl font-black uppercase tracking-tight italic">Seleccionar Mesa</h2>
        <p class="text-[9px] font-black text-white/20 uppercase tracking-[3px]">Elija el destino del pedido</p>
      </div>
    </div>
    <button (click)="onClose()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/5 text-white/20 transition-all active:scale-90">
      <span class="material-symbols-rounded">close</span>
    </button>
  </header>

  <!-- Mesas Grid -->
  <div class="flex-1 overflow-y-auto no-scrollbar px-8 py-4">
    <div class="grid grid-cols-3 gap-4">
      @for (t of tables(); track t.id) {
        <k-card
          variant="glass"
          padding="none"
          radius="lg"
          [clickable]="true"
          (kClick)="selectTable(t)"
          [customClass]="'h-28 flex flex-col items-center justify-center gap-1 group border-white/5 transition-all duration-300 ' + (t.status === 'occupied' ? 'border-k-red/30 bg-k-red/[0.03] shadow-[0_0_12px_rgba(224,47,47,0.05)] hover:border-k-red/60' : 'hover:border-k-green/30')"
        >
          <span [class]="'text-[9px] font-black uppercase tracking-[2px] transition-colors ' + (t.status === 'occupied' ? 'text-white/40 group-hover:text-k-red' : 'text-white/40 group-hover:text-k-green')">Mesa</span>
          <span [class]="'text-3xl font-black italic transition-colors leading-none ' + (t.status === 'occupied' ? 'text-white group-hover:text-k-red' : 'text-white group-hover:text-k-green')">{{ t.number }}</span>
          
          @if (t.status === 'occupied') {
            <span class="text-[8px] font-black text-k-red uppercase tracking-widest mt-1">En Uso</span>
            @if (getTableActiveItems(t.id)) {
              <span class="text-[7px] font-bold text-white/30 truncate max-w-[85%] mt-0.5" [title]="getTableActiveItems(t.id)">
                {{ getTableActiveItems(t.id) }}
              </span>
            }
          } @else {
            <span class="text-[8px] font-black text-k-green uppercase tracking-widest mt-1">Libre</span>
          }
        </k-card>
      }
    </div>
  </div>

  <footer class="p-8 pt-4 border-t border-white/5">
    <p class="text-[9px] font-bold text-center text-white/10 uppercase tracking-[4px]">Solo se muestran mesas habilitadas</p>
  </footer>
</k-card>
