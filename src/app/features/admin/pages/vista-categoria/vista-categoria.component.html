<k-card padding="lg" radius="xl">
  <k-page-header 
    title="Gestión de Categorías" 
    subtitle="Clasifica tus productos para mozos y clientes"
    icon="collections_bookmark"
  >
    <k-button (kClick)="openCategoryDialog()">+ Nueva Categoría</k-button>
  </k-page-header>
  
  <div class="flex flex-col gap-2.5 mt-8">
    @if (facade.loading()) {
      <div class="py-10 text-center opacity-50 font-black text-[10px] uppercase tracking-widest">Cargando categorías...</div>
    } @else {
      @for (c of facade.categories(); track c.id) {
        <k-category-admin-item 
          [category]="c" 
          (onEdit)="openCategoryDialog($event)" 
          (onDelete)="deleteCategory($event)">
        </k-category-admin-item>
      } @empty {
        <div class="py-20 text-center opacity-20 font-black text-[10px] uppercase tracking-[3px] border border-dashed border-white/5 rounded-[32px]">
          No hay categorías registradas en el sistema
        </div>
      }
    }
  </div>
</k-card>
