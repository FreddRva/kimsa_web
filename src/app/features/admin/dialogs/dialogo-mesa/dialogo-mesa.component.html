<div class="p-8 bg-[#0d0d0d] text-white rounded-[32px] border border-white/5 shadow-2xl">
  <k-page-header 
    [title]="isEditing ? 'Editar Mesa' : 'Nueva Mesa'" 
    subtitle="Gestión del salón"
    [icon]="isEditing ? 'edit' : 'add_circle'"
    class="mb-8"
  ></k-page-header>

  <div class="flex flex-col gap-6 min-w-[350px]">
    <k-input label="Número o Nombre de Mesa" [(value)]="tableData.number" icon="table_bar" placeholder="Ej. Mesa 01, VIP 1..."></k-input>
    
    <k-input label="Capacidad (Personas)" type="number" [(value)]="tableData.capacity" icon="groups" placeholder="Ej. 4"></k-input>

    <div class="flex flex-col gap-2">
      <label class="text-[10px] font-black opacity-30 uppercase tracking-[2px] ml-1">Estado Inicial</label>
      <div class="bg-white/5 border border-white/5 rounded-2xl px-5 py-4 flex items-center">
        <span class="material-symbols-rounded text-white/20 mr-3">info</span>
        <select [(ngModel)]="tableData.status" class="bg-transparent border-none outline-none w-full text-sm font-bold text-white appearance-none cursor-pointer">
          <option value="available" class="bg-[#0d0d0d]">Disponible</option>
          <option value="occupied" class="bg-[#0d0d0d]">Ocupada (En servicio)</option>
        </select>
      </div>
    </div>

    @if (errorMessage()) {
      <k-badge variant="danger" customClass="w-full !justify-center py-4">{{ errorMessage() }}</k-badge>
    }
  </div>

  <footer class="flex justify-end gap-4 mt-10 pt-8 border-t border-white/5">
    <k-button variant="ghost" (kClick)="dialogRef.close()">Cancelar</k-button>
    <k-button size="lg" customClass="!px-10" (kClick)="onSave()" [loading]="loading()">Guardar Mesa</k-button>
  </footer>
</div>
