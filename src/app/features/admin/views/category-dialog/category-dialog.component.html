<div class="p-8 bg-[#0d0d0d] text-white rounded-[32px] border border-white/5 shadow-2xl">
  <header class="flex items-center gap-4 mb-8 pb-6 border-b border-white/5">
    <div class="w-12 h-12 bg-green-600/10 rounded-2xl flex items-center justify-center text-green-600">
      <mat-icon class="text-2xl">{{ isEditing ? 'edit' : 'add_circle' }}</mat-icon>
    </div>
    <div>
      <h2 class="text-xl font-black tracking-tight m-0">{{ isEditing ? 'Editar Categoría' : 'Nueva Categoría' }}</h2>
      <p class="text-[10px] opacity-30 font-bold uppercase tracking-[2px] mt-1">Gestión de menú Kimsa</p>
    </div>
  </header>

  <div class="flex flex-col gap-6 min-w-[320px]">
    <k-input
      label="Nombre de Categoría"
      placeholder="Ej: Entradas, Bebidas..."
      [(value)]="catData.name"
      icon="label"
    ></k-input>

    <div class="flex flex-col gap-2">
      <k-input
        label="Icono (Material Icon)"
        placeholder="Ej: restaurant, local_cafe"
        [(value)]="catData.iconName"
        [icon]="catData.iconName || 'category'"
      ></k-input>
      <p class="text-[9px] opacity-20 font-bold ml-1 uppercase tracking-widest">
        Busca iconos en <a href="https://fonts.google.com/icons" target="_blank" class="text-green-600 underline">Google Fonts</a>
      </p>
    </div>

    @if (errorMessage()) {
      <div class="bg-red-500/10 border border-red-500/20 p-4 rounded-2xl text-red-500 text-[10px] font-black text-center animate-pulse">
        {{ errorMessage() }}
      </div>
    }
  </div>

  <footer class="flex justify-end gap-4 mt-10 pt-8 border-t border-white/5">
    <button 
      (click)="dialogRef.close()" 
      class="bg-transparent border-none text-white/30 text-[10px] font-black uppercase tracking-widest cursor-pointer hover:text-white transition-colors"
      [disabled]="loading()"
    >
      Cancelar
    </button>
    <k-button 
      (kClick)="onSave()" 
      [loading]="loading()"
      customClass="!px-10"
    >
      {{ isEditing ? 'Actualizar' : 'Crear Categoría' }}
    </k-button>
  </footer>
</div>
