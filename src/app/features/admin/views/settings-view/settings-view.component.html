<div class="max-w-2xl">
  <k-card padding="lg" radius="xl">
    <header class="mb-10">
      <h3 class="text-[22px] font-black m-0 text-white">Configuración General</h3>
      <p class="text-[13px] opacity-40 mt-1.5 font-bold">Administra la identidad de tu marca</p>
    </header>
    <div class="flex flex-col gap-8">
      <k-input
        label="Nombre del Negocio"
        [(value)]="businessName"
        placeholder="Ej. KIMSA RESTOBAR"
        icon="business"
      ></k-input>

      <k-button customClass="w-full" (kClick)="saveSettings()" [disabled]="isSaving()">
        {{ isSaving() ? 'Guardando...' : 'Guardar Cambios' }}
      </k-button>
    </div>
  </k-card>
</div>
