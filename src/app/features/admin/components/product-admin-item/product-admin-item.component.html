<div class="bg-white/[0.02] border border-white/[0.03] rounded-[24px] p-5 px-7.5 flex items-center gap-6 hover:bg-white/[0.04] transition-all group animate-fade">
  <!-- Imagen -->
  <div class="w-14 h-14 rounded-2xl overflow-hidden bg-white/5 border border-white/5 flex items-center justify-center">
    @if (product.imageUrl) {
      <img [src]="product.imageUrl" class="w-full h-full object-cover" />
    } @else {
      <span class="material-symbols-rounded opacity-20">restaurant</span>
    }
  </div>

  <!-- Información -->
  <div class="flex flex-col flex-[5] gap-1">
    <strong class="text-sm font-black tracking-wide group-hover:text-k-green transition-colors uppercase">{{ product.name }}</strong>
    <span class="text-[10px] opacity-30 font-black uppercase tracking-widest line-clamp-1">
      {{ product.description || 'Sin descripción' }}
    </span>
  </div>

  <!-- Estado -->
  <div class="flex-[2] flex justify-center">
    <k-badge [variant]="product.isAvailable ? 'success' : 'danger'" [dot]="true" size="sm">
      {{ product.isAvailable ? 'DISPONIBLE' : 'AGOTADO' }}
    </k-badge>
  </div>

  <!-- Precio -->
  <div class="flex-[2] text-right">
    <span class="text-base font-black text-white italic">S/ {{ product.price | number:'1.2-2' }}</span>
  </div>

  <!-- Acciones -->
  <div class="flex gap-2.5 ml-auto">
    <k-button variant="glass-interactive" customClass="!p-2 w-10 h-10" (kClick)="edit.emit(product)">
      <span class="material-symbols-rounded text-lg">edit</span>
    </k-button>
    <k-button variant="danger" customClass="!p-2 w-10 h-10" (kClick)="delete.emit(product)">
      <span class="material-symbols-rounded text-lg">delete</span>
    </k-button>
  </div>
</div>
