<div
  class="relative flex h-screen w-full items-center justify-center overflow-hidden bg-[#0a0a0c] font-outfit text-white"
>
  <!-- BACKGROUND GRADIENTS & IMAGES (PERFECTLY BALANCED) -->
  <div class="absolute inset-0 z-0">
    <div
      class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(34,197,94,0.15),transparent_65%)]"
    ></div>
    <div
      class="absolute inset-0 bg-[radial-gradient(circle_at_20%_80%,rgba(220,38,38,0.06),transparent_60%)]"
    ></div>
    <img
      src="assets/images/Fondo.png"
      class="h-full w-full object-cover opacity-35 mix-blend-overlay"
    />
  </div>

  <!-- LOGIN CARD (WIDER & HIGHLY PROFESSIONAL) -->
  <div class="relative z-10 w-full max-w-[520px] px-6">
    <div class="animate-in fade-in zoom-in-95 duration-700">
      <!-- LOGO AREA (FLOATING LOGO WITH ROUNDED BORDERS) -->
      <div class="mb-8 flex flex-col items-center gap-5">
        <img
          src="assets/images/Logo.png"
          class="h-28 w-28 object-cover rounded-[32px] border border-white/10 transition-transform duration-500 hover:scale-110 filter drop-shadow-[0_10px_20px_rgba(34,197,94,0.35)]"
        />
        <div class="text-center">
          <h1 class="text-4xl font-black italic tracking-tighter text-white">
            KIMSA <span class="text-k-green">RESTAURANT</span>
          </h1>
          <p class="text-[11px] font-black uppercase tracking-[6px] text-white/35">
            Gestión Inteligente
          </p>
        </div>
      </div>

      <!-- FORM CARD (SPACIOUS & MODERN) -->
      <div
        class="flex flex-col gap-6 rounded-[48px] border border-white/10 bg-white/[0.03] p-12 backdrop-blur-3xl shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)]"
      >
        <div class="mb-2">
          <h2 class="text-4xl font-black text-center uppercase italic tracking-tight">
            Bienvenido
          </h2>
          <p class="text-sm text-center font-semibold text-white/35 mt-1">
            Ingresa tus credenciales para continuar
          </p>
        </div>

        <k-input
          label="Correo Electrónico"
          [(value)]="email"
          icon="alternate_email"
          placeholder="nombre@kimsa.com"
          (keyup.enter)="onLogin()"
        ></k-input>

        <k-input
          label="Contraseña"
          type="password"
          [(value)]="password"
          icon="lock"
          placeholder="••••••••"
          (keyup.enter)="onLogin()"
        ></k-input>

        @if (loginError()) {
          <k-badge
            variant="danger"
            customClass="w-full !justify-center py-4 animate-in slide-in-from-top-2 !rounded-2xl"
          >
            {{ loginError() }}
          </k-badge>
        }

        <k-button
          variant="luxury"
          size="lg"
          customClass="w-full !h-16 !text-lg !font-black !italic !tracking-widest mt-4"
          (kClick)="onLogin()"
          [loading]="isLoading()"
        >
          INICIAR SESIÓN
        </k-button>
      </div>
    </div>
  </div>
</div>
