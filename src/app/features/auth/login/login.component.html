<div
  class="relative flex h-screen w-full items-center justify-center overflow-hidden bg-[#020202] font-outfit text-white"
>
  <!-- BACKGROUND ANIMATION -->
  <div class="absolute inset-0 z-0">
    <div
      class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(22,163,74,0.1),transparent_70%)]"
    ></div>
    <div
      class="absolute inset-0 bg-[radial-gradient(circle_at_80%_20%,rgba(220,38,38,0.05),transparent_50%)]"
    ></div>
    <img
      src="assets/images/Fondo.png"
      class="h-full w-full object-cover opacity-20 mix-blend-overlay"
    />
  </div>

  <!-- LOGIN CARD -->
  <div class="relative z-10 w-full max-w-[450px] px-6">
    <div class="animate-in fade-in zoom-in duration-700">
      <!-- LOGO AREA -->
      <div class="mb-10 flex flex-col items-center gap-4">
        <div
          class="flex h-24 w-24 items-center justify-center rounded-[32px] bg-white/[0.03] p-4 border border-white/10 shadow-2xl backdrop-blur-md"
        >
          <img src="assets/images/LogoOriginal.png" class="h-full w-full object-contain" />
        </div>
        <div class="text-center">
          <h1 class="text-3xl font-black italic tracking-tighter text-white">
            KIMSA <span class="text-k-green">RESTAURANT</span>
          </h1>
          <p class="text-[10px] font-black uppercase tracking-[5px] text-white/30">
            Gestión Inteligente
          </p>
        </div>
      </div>

      <!-- FORM -->
      <div
        class="flex flex-col gap-6 rounded-[40px] border border-white/5 bg-white/[0.02] p-10 backdrop-blur-3xl shadow-2xl"
      >
        <div class="mb-2">
          <h2 class="text-xl font-black uppercase italic">Bienvenido</h2>
          <p class="text-xs font-bold text-white/20">Ingresa tus credenciales para continuar</p>
        </div>

        <k-input
          label="Correo Electrónico"
          [(value)]="email"
          icon="alternate_email"
          placeholder="nombre@kimsa.com"
          (keyup.enter)="onLogin()"
        ></k-input>

        <k-input
          label="Contraseña"
          type="password"
          [(value)]="password"
          icon="lock"
          placeholder="••••••••"
          (keyup.enter)="onLogin()"
        ></k-input>

        @if (loginError()) {
          <k-badge
            variant="danger"
            customClass="w-full !justify-center py-4 animate-in slide-in-from-top-2"
          >
            {{ loginError() }}
          </k-badge>
        }

        <k-button
          variant="luxury"
          size="lg"
          customClass="w-full !h-16 !text-lg !font-black !italic !tracking-widest mt-4"
          (kClick)="onLogin()"
          [loading]="isLoading()"
        >
          INICIAR SESIÓN
        </k-button>
      </div>
    </div>
  </div>
</div>
