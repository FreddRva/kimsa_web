<div class="h-full p-10 animate-in fade-in duration-700">
  <div class="max-w-7xl mx-auto">
    <k-page-header title="Balance de Caja" subtitle="Resumen contable de la sesión activa"></k-page-header>
       <!-- Tarjetas de Resumen -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <!-- Efectivo -->
      <k-card padding="lg" radius="xl" customClass="bg-white/[0.03] flex flex-col justify-between h-[180px]">
        <div class="w-10 h-10 bg-green-500/10 rounded-xl flex items-center justify-center">
          <mat-icon class="text-green-500">payments</mat-icon>
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-[10px] font-black tracking-[1.5px] text-white/30 uppercase">EFECTIVO</span>
          <span class="text-3xl font-black italic">S/ {{ formatPrice(stats.cash) }}</span>
        </div>
      </k-card>

      <!-- Digital / Culqi -->
      <k-card padding="lg" radius="xl" customClass="bg-white/[0.03] flex flex-col justify-between h-[180px]">
        <div class="w-10 h-10 bg-orange-500/10 rounded-xl flex items-center justify-center">
          <mat-icon class="text-orange-500">credit_card</mat-icon>
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-[10px] font-black tracking-[1.5px] text-white/30 uppercase">CULQI (TERMINAL)</span>
          <span class="text-3xl font-black italic">S/ {{ formatPrice(stats.digital) }}</span>
        </div>
      </k-card>

      <!-- Anulado -->
      <k-card padding="lg" radius="xl" customClass="bg-white/[0.03] flex flex-col justify-between h-[180px]">
        <div class="w-10 h-10 bg-red-500/10 rounded-xl flex items-center justify-center">
          <mat-icon class="text-red-500">cancel</mat-icon>
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-[10px] font-black tracking-[1.5px] text-white/30 uppercase">ANULADO</span>
          <span class="text-3xl font-black italic text-white/50">S/ {{ formatPrice(stats.cancelled || 0) }}</span>
        </div>
      </k-card>
    </div>

    <!-- Total Recaudado -->
    <k-card padding="xl" radius="xl" customClass="bg-white/[0.03] mb-8">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex flex-col">
          <span class="text-[24px] font-light tracking-[4px] text-white">TOTAL RECAUDADO HOY</span>
          <span class="text-[10px] font-black tracking-[1.5px] text-white/30 uppercase">BALANCE GENERAL DE VENTAS</span>
        </div>
        <span class="text-6xl font-black text-green-500 italic">S/ {{ formatPrice(stats.total) }}</span>
      </div>
    </k-card>

    <!-- Botones de Acción -->
    <div class="flex justify-end gap-4">
      <button 
        class="rounded-xl border border-white/10 bg-white/[0.02] px-6 py-4 text-[11px] font-black tracking-[1px] text-white/60 hover:bg-white/[0.05] transition-all flex items-center gap-2"
        (click)="onPrint.emit()">
        <mat-icon class="text-[18px] w-[18px] h-[18px] leading-none">print</mat-icon>
        IMPRIMIR RESUMEN
      </button>
      <button 
        class="rounded-xl bg-red-600 px-8 py-4 text-[11px] font-black tracking-[1px] text-white hover:bg-red-700 transition-all flex items-center gap-2 shadow-[0_10px_20px_rgba(220,38,38,0.3)]"
        (click)="onCloseShift.emit()">
        <mat-icon class="text-[18px] w-[18px] h-[18px] leading-none">lock</mat-icon>
        CERRAR TURNO Y CAJA
      </button>
    </div>
  </div>
</div>
