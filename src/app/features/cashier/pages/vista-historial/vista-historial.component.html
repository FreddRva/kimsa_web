<div class="flex flex-col gap-10 animate-fade">
  <k-page-header title="Historial de Ventas" subtitle="Revisa los cobros realizados hoy" icon="history">
    <div class="bg-k-green/10 border border-k-green/20 px-6 py-3 rounded-2xl flex flex-col items-end">
      <span class="text-[9px] font-black text-k-green uppercase tracking-[3px]">Total recaudado</span>
      <span class="text-2xl font-black text-white italic">S/ {{ totalDay() | number:'1.2-2' }}</span>
    </div>
  </k-page-header>

  <div class="flex gap-3 mb-4">
    @for (f of ['Todos', 'EFECTIVO', 'TARJETA', 'YAPE', 'ANULADOS']; track f) {
      <k-button 
        [variant]="currentFilter() === f ? 'glass' : 'ghost'"
        size="sm"
        customClass="!px-6"
        (kClick)="currentFilter.set(f)"
      >
        <span class="text-[10px] font-black uppercase tracking-widest">{{ f }}</span>
      </k-button>
    }
  </div>

  <div class="flex flex-col gap-3">
    @for (o of filteredOrders(); track o.id) {
      <k-order-history-item [order]="o"></k-order-history-item>
    } @empty {
      <div class="flex flex-col items-center justify-center py-24 opacity-10">
        <span class="material-symbols-rounded text-7xl mb-4">history_toggle_off</span>
        <span class="text-[10px] font-black tracking-[4px] uppercase">No hay registros hoy</span>
      </div>
    }
  </div>
</div>
