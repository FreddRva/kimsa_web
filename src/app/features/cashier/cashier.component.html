<div class="min-h-screen bg-[#050505] text-white">
  <!-- Header de Caja con Navegación Central -->
  <k-header
    [title]="getTabTitle()"
    [userName]="userName()"
    userRole="Cajero de Turno"
    (logout)="onLogout()"
  >
    <!-- Botones de Navegación Estilo Tabs -->
    <div
      center
      class="flex items-center gap-2 bg-white/5 p-1 rounded-2xl border border-white/5 backdrop-blur-md"
    >
      <button
        (click)="selectedTab.set(0)"
        [class]="'flex items-center gap-2 px-4 py-2 rounded-xl transition-all duration-300 ' + (selectedTab() === 0 ? 'bg-k-green text-black font-black shadow-[0_0_15px_rgba(34,197,94,0.4)]' : 'text-white/40 hover:text-white hover:bg-white/5')"
      >
        <span class="material-symbols-rounded text-lg">point_of_sale</span>
        <span class="text-[10px] font-black uppercase tracking-widest hidden lg:block">Venta</span>
      </button>

      <button
        (click)="selectedTab.set(3)"
        [class]="'flex items-center gap-2 px-4 py-2 rounded-xl transition-all duration-300 ' + (selectedTab() === 3 ? 'bg-k-green text-black font-black shadow-[0_0_15px_rgba(34,197,94,0.4)]' : 'text-white/40 hover:text-white hover:bg-white/5')"
      >
        <span class="material-symbols-rounded text-lg">group</span>
        <span class="text-[10px] font-black uppercase tracking-widest hidden lg:block"
          >Clientes</span
        >
      </button>

      <button
        (click)="selectedTab.set(1)"
        [class]="'flex items-center gap-2 px-4 py-2 rounded-xl transition-all duration-300 ' + (selectedTab() === 1 ? 'bg-k-green text-black font-black shadow-[0_0_15px_rgba(34,197,94,0.4)]' : 'text-white/40 hover:text-white hover:bg-white/5')"
      >
        <span class="material-symbols-rounded text-lg">history</span>
        <span class="text-[10px] font-black uppercase tracking-widest hidden lg:block"
          >Historial</span
        >
      </button>

      <button
        (click)="selectedTab.set(2)"
        [class]="'flex items-center gap-2 px-4 py-2 rounded-xl transition-all duration-300 ' + (selectedTab() === 2 ? 'bg-k-green text-black font-black shadow-[0_0_15px_rgba(34,197,94,0.4)]' : 'text-white/40 hover:text-white hover:bg-white/5')"
      >
        <span class="material-symbols-rounded text-lg">account_balance_wallet</span>
        <span class="text-[10px] font-black uppercase tracking-widest hidden lg:block"
          >Caja Chica</span
        >
      </button>
    </div>
  </k-header>

  <!-- Contenido Dinámico de Caja -->
  <main class="container mx-auto px-6 py-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
    @if (selectedTab() === 0) {
      <vista-nexus></vista-nexus>
    }
    @if (selectedTab() === 1) {
      <vista-historial></vista-historial>
    }
    @if (selectedTab() === 2) {
      <vista-balance></vista-balance>
    }
    @if (selectedTab() === 3) {
      <vista-cliente></vista-cliente>
    }
  </main>
</div>
