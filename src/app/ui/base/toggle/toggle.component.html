<div 
  (click)="toggle()"
  class="flex items-center justify-between bg-white/[0.02] border border-white/5 p-5 rounded-[24px] cursor-pointer transition-all hover:bg-white/[0.04] group"
>
  <div class="flex items-center gap-4">
    @if (icon) {
      <div class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-500" 
           [class]="checked ? 'bg-k-green/10 text-k-green shadow-[0_0_20px_rgba(34,197,94,0.1)]' : 'bg-white/5 text-white/20'">
        <span class="material-symbols-rounded text-[22px]">{{ icon }}</span>
      </div>
    }
    <div>
      @if (label) {
        <p class="text-sm font-black text-white uppercase tracking-tight group-hover:text-k-green transition-colors">{{ label }}</p>
      }
      @if (subtitle) {
        <p class="text-[10px] text-white/30 mt-0.5 font-black uppercase tracking-widest">{{ subtitle }}</p>
      }
    </div>
  </div>
  
  <!-- El Switch -->
  <div 
    class="w-12 h-7 rounded-full p-1.5 transition-all duration-500 border border-white/5 shadow-inner relative"
    [class]="checked ? 'bg-k-green shadow-[0_0_15px_rgba(34,197,94,0.3)]' : 'bg-white/10'"
  >
    <div 
      class="w-4 h-4 bg-white rounded-full shadow-lg transition-all duration-500"
      [style.transform]="checked ? 'translateX(20px)' : 'translateX(0px)'"
    ></div>
  </div>
</div>
