<button
  [disabled]="disabled || loading"
  [class]="
    'relative overflow-hidden inline-flex items-center justify-center gap-3 font-black tracking-[0.2em] uppercase transition-all duration-500 active:scale-90 disabled:opacity-50 disabled:cursor-not-allowed group ' +
    getVariantClass() +
    ' ' +
    getSizeClass() +
    ' ' +
    customClass
  "
  (click)="onClick($event)"
>
  <!-- Layer 1: Ambient Glow (Luxury only) -->
  @if (variant === 'luxury') {
    <div
      class="absolute inset-0 bg-k-gold/20 blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-700"
    ></div>
  }

  <!-- Layer 2: Animated Shine Sweep -->
  <div
    class="absolute inset-0 w-[200%] h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -skew-x-[35deg] -translate-x-[150%] group-hover:animate-[shine_1.2s_infinite]"
  ></div>

  <!-- Content -->
  <div class="relative z-10 flex items-center gap-3">
    @if (loading) {
      <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
          fill="none"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    }
    <ng-content></ng-content>
  </div>
</button>
