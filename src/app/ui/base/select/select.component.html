<div class="flex flex-col gap-2 w-full group relative" [class]="customClass">
  @if (label) {
    <label class="text-[10px] font-black tracking-[0.2em] uppercase text-white/30 ml-4">
      {{ label }}
    </label>
  }

  <!-- Trigger del Select -->
  <div 
    (click)="toggle()"
    class="relative flex items-center bg-black/40 border border-white/5 rounded-[20px] backdrop-blur-md cursor-pointer transition-all duration-300 hover:bg-black/60 hover:border-k-green/30 px-6 py-4.5"
    [class.border-k-green]="isOpen()"
  >
    @if (icon) {
      <span class="material-symbols-rounded mr-4 text-k-green/80 text-[20px] transition-colors">
        {{ icon }}
      </span>
    }

    <span class="flex-1 text-[13px] font-black uppercase tracking-widest text-white/90">
      {{ getSelectedLabel() }}
    </span>

    <span class="material-symbols-rounded text-white/20 transition-transform duration-300" [class.rotate-180]="isOpen()">
      expand_more
    </span>
  </div>

  <!-- Menú Desplegable -->
  @if (isOpen()) {
    <div class="fixed inset-0 z-[110]" (click)="isOpen.set(false)"></div>
    
    <div class="absolute top-[calc(100%+8px)] left-0 w-full bg-[#0a0a0a]/95 border border-white/10 rounded-[24px] shadow-[0_20px_50px_rgba(0,0,0,0.5)] backdrop-blur-xl z-[120] overflow-hidden animate-in fade-in zoom-in-95 duration-200">
      <div class="max-h-[280px] overflow-y-auto no-scrollbar py-2">
        @for (opt of options; track opt.value) {
          <div 
            (click)="selectOption(opt)"
            class="flex items-center gap-4 px-6 py-4 transition-all hover:bg-k-green/10 cursor-pointer group/opt"
            [class.bg-white]="value === opt.value"
            [class.bg-opacity-5]="value === opt.value"
          >
            <div class="w-1.5 h-1.5 rounded-full transition-all" [class]="value === opt.value ? 'bg-k-green shadow-[0_0_10px_rgba(34,197,94,0.8)]' : 'bg-white/10 group-hover/opt:bg-white/30'"></div>
            <span class="text-[11px] font-black uppercase tracking-[2px]" [class]="value === opt.value ? 'text-white' : 'text-white/40 group-hover/opt:text-white'">
              {{ opt.label }}
            </span>
          </div>
        }
      </div>
    </div>
  }
</div>
